<title>Contact — Free Invoice Generator</title>
<meta name="description" content="Contact us with questions about the Free Invoice Generator.">
<meta name="robots" content="index, follow">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f8f9fc;color:#0f172a;line-height:1.7}
nav{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 20px}
.nav-inner{max-width:780px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-weight:600;font-size:17px;color:#0f172a;text-decoration:none}.nav-logo span{color:#2563eb}
.back{font-size:14px;color:#2563eb;text-decoration:none}
.content{max-width:780px;margin:40px auto;padding:0 20px 60px}
h1{font-size:30px;font-weight:600;margin-bottom:16px;letter-spacing:-.02em}
p{font-size:15px;color:#334155;margin-bottom:16px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:28px;margin-top:24px}
label{display:block;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
input,textarea{width:100%;background:#f8f9fc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-size:14px;color:#0f172a;font-family:'DM Sans',sans-serif;margin-bottom:16px}
input:focus,textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
textarea{min-height:100px;resize:vertical}
button{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:11px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
button:hover{background:#1d4ed8}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  body{font-size:15px}
  h1{font-size:clamp(22px,6vw,32px)!important}
  .wrap,.content,.container{padding:20px 14px!important}
  nav,.nav-inner,.header-inner{padding:0 12px!important}
}
</style>
<meta name="google-adsense-account" content="ca-pub-4036780477567730">
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">Invoice<span>Free</span></a>
    <a href="/" class="back">← Back to Tool</a>
  </div>
</nav>
<div class="content">
  <h1>Contact Us</h1>
  <p>Have a question, suggestion, or found a bug? We'd love to hear from you. Fill out the form below and we'll get back to you as soon as possible.</p>
  <div class="card">
    <form action="https://formsubmit.co/youssef.designer1@outlook.com" method="POST">
      <input type="hidden" name="_subject" value="New Contact — GetInvoiceFree">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://getinvoicefree.app/">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" placeholder="Jane Smith" required>
      <label for="email">Your Email</label>
      <input type="email" id="email" name="email" placeholder="jane@example.com" required>
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Tell us what's on your mind..." required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>
</div>
